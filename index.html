<script>
/* ====== STATE & CONSTANTS ====== */
const PIN_CODE = "1234"; // demo PIN
const BALANCE_KEY = "bank_base_balance_ngn";
const TRANS_KEY   = "bank_transactions_ngn";
const CURR_KEY    = "bank_selected_currency";

let baseBalanceNGN = 22450000; // internal base balance in NGN
let transactions = [];
let selectedCurrency = { code:"NGN", symbol:"₦", name:"Nigerian Naira" };

/* fallback conversion rates from NGN to others (approx) */
const ratesFromNGN = {
  NGN:1,
  USD:0.00067,
  EUR:0.00062,
  GBP:0.00053,
  CAD:0.0009,
  AUD:0.0010,
  JPY:0.11,
  CNY:0.0045,
  GHS:0.0075,
  KES:0.089,
  ZAR:0.012
};

const currencies = [
  {code:"NGN", symbol:"₦", name:"Nigerian Naira"},
  {code:"USD", symbol:"$", name:"US Dollar"},
  {code:"EUR", symbol:"€", name:"Euro"},
  {code:"GBP", symbol:"£", name:"British Pound"},
  {code:"CAD", symbol:"C$", name:"Canadian Dollar"},
  {code:"AUD", symbol:"A$", name:"Australian Dollar"},
  {code:"JPY", symbol:"¥", name:"Japanese Yen"},
  {code:"CNY", symbol:"¥", name:"Chinese Yuan"},
  {code:"GHS", symbol:"₵", name:"Ghanaian Cedi"},
  {code:"KES", symbol:"KSh", name:"Kenyan Shilling"},
  {code:"ZAR", symbol:"R", name:"South African Rand"}
];

/* ====== INIT ====== */
function initApp(){
  const savedBalance = localStorage.getItem(BALANCE_KEY);
  const savedTrans   = localStorage.getItem(TRANS_KEY);
  const savedCurr    = localStorage.getItem(CURR_KEY);

  if(savedBalance !== null){
    baseBalanceNGN = Number(savedBalance);
  }

  if(savedTrans){
    try{
      transactions = JSON.parse(savedTrans);
    }catch(e){
      transactions = [];
    }
  }

  if(savedCurr){
    try{
      const obj = JSON.parse(savedCurr);
      const found = currencies.find(c => c.code === obj.code);
      if(found) selectedCurrency = found;
    }catch(e){}
  }

  if(transactions.length === 0){
    transactions = [
      {title:"Transfer to John Doe", time:"Today • 10:45 AM", amountNGN:-45000, status:"success"},
      {title:"Transfer to Sarah Tech", time:"Today • 9:12 AM", amountNGN:-12000, status:"failed"},
      {title:"Airtime Recharge", time:"Yesterday • 6:40 PM", amountNGN:-2000, status:"success"},
      {title:"Salary Payment", time:"Yesterday • 8:00 AM", amountNGN:350000, status:"success"}
    ];
  }

  updateBalanceDisplay();
  renderTransactions();
}

/* ====== STORAGE ====== */
function saveState(){
  localStorage.setItem(BALANCE_KEY, baseBalanceNGN.toString());
  localStorage.setItem(TRANS_KEY, JSON.stringify(transactions));
  localStorage.setItem(CURR_KEY, JSON.stringify(selectedCurrency));
}

/* ====== CURRENCY & FORMATTING ====== */
function convertFromNGN(amountNGN, code){
  const rate = ratesFromNGN[code] || 1;
  return amountNGN * rate;
}

function formatAmount(amountNGN){
  const converted = convertFromNGN(Math.abs(amountNGN), selectedCurrency.code);
  const sign = amountNGN < 0 ? "-" : "+";
  return sign + selectedCurrency.symbol + converted.toLocaleString(undefined, {maximumFractionDigits:2});
}

function updateBalanceDisplay(){
  const el = document.getElementById("balanceDisplay");
  const converted = convertFromNGN(baseBalanceNGN, selectedCurrency.code);
  el.innerText = selectedCurrency.symbol + converted.toLocaleString(undefined, {maximumFractionDigits:2});
}

/* ====== TRANSACTIONS RENDER ====== */
function renderTransactions(){
  const container = document.getElementById("transactionsList");
  container.innerHTML = "";

  transactions.slice().reverse().forEach(tx => {
    const div = document.createElement("div");
    div.className = "trans-item";

    const statusClass = tx.status === "success" ? "success" : "failed";
    const amountClass = tx.status === "failed" ? "red" : (tx.amountNGN >= 0 ? "green" : "green");
    const statusText  = tx.status === "success" ? "Successful" : "Failed";

    div.innerHTML = `
      <div class="trans-left">
        <div class="trans-status ${statusClass}">${tx.status === "success" ? "✓" : "✕"}</div>
        <div class="trans-info">
          <h4>${tx.title}</h4>
          <p>${tx.time}</p>
        </div>
      </div>
      <div class="trans-amount">
        <h3 class="${amountClass}">${formatAmount(tx.amountNGN)}</h3>
        <span class="${amountClass}">${statusText}</span>
      </div>
    `;
    container.appendChild(div);
  });
}

/* ====== PANEL HANDLING ====== */
function openPanel(type){
  const panel = document.getElementById("panel");
  const content = document.getElementById("panelContent");
  let html = "";

  if(type === "transfer"){
    html = `
      <div class="panel-title">Transfer Money</div>
      <div class="input-box">
        <label>Recipient Name</label>
        <input type="text" id="transferName" placeholder="John Doe">
      </div>
      <div class="input-box">
        <label>Recipient Account Number</label>
        <input type="number" id="transferAccount" placeholder="Enter account number">
      </div>
      <div class="input-box">
        <label>Amount (${selectedCurrency.symbol})</label>
        <input type="number" id="transferAmount" placeholder="Enter amount">
      </div>
      <button class="confirm-btn" onclick="startTransfer()">Continue</button>
    `;
  }else if(type === "airtime"){
    html = `
      <div class="panel-title">Buy Airtime</div>
      <div class="input-box">
        <label>Phone Number</label>
        <input type="number" id="airtimePhone" placeholder="Enter phone number">
      </div>
      <div class="input-box">
        <label>Amount (${selectedCurrency.symbol})</label>
        <input type="number" id="airtimeAmount" placeholder="Enter amount">
      </div>
      <button class="confirm-btn" onclick="startAirtime()">Buy Airtime</button>
    `;
  }else if(type === "bills"){
    html = `
      <div class="panel-title">Pay Bills</div>
      <div class="input-box">
        <label>Bill Type</label>
        <input type="text" id="billType" placeholder="Electricity, Water, etc">
      </div>
      <div class="input-box">
        <label>Amount (${selectedCurrency.symbol})</label>
        <input type="number" id="billAmount" placeholder="Enter amount">
      </div>
      <button class="confirm-btn" onclick="startBill()">Pay Bill</button>
    `;
  }else if(type === "data"){
    html = `
      <div class="panel-title">Buy Data</div>
      <div class="input-box">
        <label>Network</label>
        <input type="text" id="dataNetwork" placeholder="MTN, Airtel, Glo, 9mobile">
      </div>
      <div class="input-box">
        <label>Data Plan</label>
        <input type="text" id="dataPlan" placeholder="1GB, 2GB, etc">
      </div>
      <div class="input-box">
        <label>Amount (${selectedCurrency.symbol})</label>
        <input type="number" id="dataAmount" placeholder="Enter amount">
      </div>
      <button class="confirm-btn" onclick="startData()">Buy Data</button>
    `;
  }else if(type === "receive"){
    html = `
      <div class="panel-title">Receive Money</div>
      <div class="input-box">
        <label>Sender Name</label>
        <input type="text" id="receiveSender" placeholder="Michael Ade">
      </div>
      <div class="input-box">
        <label>Sender Account Number</label>
        <input type="text" id="receiveAccount" placeholder="Enter sender account">
      </div>
      <div class="input-box">
        <label>Amount (${selectedCurrency.symbol})</label>
        <input type="number" id="receiveAmount" placeholder="Enter amount">
      </div>
      <div class="input-box">
        <label>Description (optional)</label>
        <input type="text" id="receiveDesc" placeholder="Salary, refund, gift, etc">
      </div>
      <button class="confirm-btn" onclick="startReceive()">Add Funds</button>
    `;
  }else if(type === "currency"){
    html = `
      <div class="panel-title">Currency Settings</div>
      <p style="font-size:13px;color:#555;margin-bottom:10px;">
        Choose the currency you want to view your balance and transactions in.
      </p>
      <div class="currency-list">
        ${currencies.map(c => `
          <div class="currency-item ${c.code === selectedCurrency.code ? 'currency-active' : ''}"
               onclick="setCurrency('${c.code}')">
            <div>
              <div class="currency-code">${c.symbol} ${c.code}</div>
              <div class="currency-name">${c.name}</div>
            </div>
            ${c.code === selectedCurrency.code ? '<span style="color:#00a86b;font-size:18px;">✓</span>' : ''}
          </div>
        `).join('')}
      </div>
    `;
  }

  content.innerHTML = html;
  panel.classList.add("active");
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

/* ====== OVERLAY HELPERS ====== */
function showOverlay(html){
  const overlay = document.getElementById("overlay");
  const content = document.getElementById("overlayContent");
  content.innerHTML = html;
  overlay.classList.add("active");
}

function hideOverlay(){
  document.getElementById("overlay").classList.remove("active");
}

/* ====== CURRENCY CHANGE ====== */
function setCurrency(code){
  const found = currencies.find(c => c.code === code);
  if(!found) return;
  selectedCurrency = found;
  saveState();
  updateBalanceDisplay();
  renderTransactions();
  openPanel('currency');
}

/* ====== TRANSACTION FLOWS ====== */
let pendingAction = null;
let pendingPayload = null;

function startTransfer(){
  const name = document.getElementById("transferName").value.trim();
  const account = document.getElementById("transferAccount").value.trim();
  const amountVal = Number(document.getElementById("transferAmount").value);

  if(!name || !account || !amountVal || amountVal <= 0){
    alert("Please fill all fields with valid values.");
    return;
  }

  const amountNGN = amountVal / (ratesFromNGN[selectedCurrency.code] || 1);

  if(amountNGN > baseBalanceNGN){
    alert("Insufficient balance.");
    return;
  }

  pendingAction = "transfer";
  pendingPayload = {name, account, amountNGN};
  showPinPopup();
}

function startAirtime(){
  const phone = document.getElementById("airtimePhone").value.trim();
  const amountVal = Number(document.getElementById("airtimeAmount").value);

  if(!phone || !amountVal || amountVal <= 0){
    alert("Please fill all fields with valid values.");
    return;
  }

  const amountNGN = amountVal / (ratesFromNGN[selectedCurrency.code] || 1);

  if(amountNGN > baseBalanceNGN){
    alert("Insufficient balance.");
    return;
  }

  pendingAction = "airtime";
  pendingPayload = {phone, amountNGN};
  showPinPopup();
}

function startBill(){
  const type = document.getElementById("billType").value.trim();
  const amountVal = Number(document.getElementById("billAmount").value);

  if(!type || !amountVal || amountVal <= 0){
    alert("Please fill all fields with valid values.");
    return;
  }

  const amountNGN = amountVal / (ratesFromNGN[selectedCurrency.code] || 1);

  if(amountNGN > baseBalanceNGN){
    alert("Insufficient balance.");
    return;
  }

  pendingAction = "bill";
  pendingPayload = {type, amountNGN};
  showPinPopup();
}

function startData(){
  const network = document.getElementById("dataNetwork").value.trim();
  const plan = document.getElementById("dataPlan").value.trim();
  const amountVal = Number(document.getElementById("dataAmount").value);

  if(!network || !plan || !amountVal || amountVal <= 0){
    alert("Please fill all fields with valid values.");
    return;
  }

  const amountNGN = amountVal / (ratesFromNGN[selectedCurrency.code] || 1);

  if(amountNGN > baseBalanceNGN){
    alert("Insufficient balance.");
    return;
  }

  pendingAction = "data";
  pendingPayload = {network, plan, amountNGN};
  showPinPopup();
}

function startReceive(){
  const sender = document.getElementById("receiveSender").value.trim();
  const account = document.getElementById("receiveAccount").value.trim();
  const amountVal = Number(document.getElementById("receiveAmount").value);
  const desc = document.getElementById("receiveDesc").value.trim();

  if(!sender || !account || !amountVal || amountVal <= 0){
    alert("Please fill all fields with valid values.");
    return;
  }

  const amountNGN = amountVal / (ratesFromNGN[selectedCurrency.code] || 1);

  pendingAction = "receive";
  pendingPayload = {sender, account, amountNGN, desc};
  showPinPopup();
}

/* ====== PIN POPUP ====== */
function showPinPopup(){
  const html = `
    <h3>Enter PIN</h3>
    <p>For security, confirm this transaction with your 4‑digit PIN.</p>
    <input type="password" maxlength="4" class="pin-input" id="pinInput" placeholder="••••">
    <button class="confirm-btn" onclick="confirmPin()">Confirm</button>
  `;
  showOverlay(html);
  setTimeout(() => {
    const el = document.getElementById("pinInput");
    if(el) el.focus();
  }, 100);
}

function confirmPin(){
  const pin = document.getElementById("pinInput").value.trim();
  if(pin !== PIN_CODE){
    alert("Incorrect PIN");
    return;
  }
  showLoader();
  setTimeout(processPendingAction, 1500);
}

/* ====== LOADER ====== */
function showLoader(){
  const html = `
    <div class="loader"></div>
    <h3>Processing...</h3>
    <p>Please wait while we complete your transaction.</p>
  `;
  showOverlay(html);
}

/* ====== UUID GENERATOR ====== */
function generateUUID(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c){
    const r = Math.random()*16|0, v = c === 'x' ? r : (r&0x3|0x8);
    return v.toString(16);
  });
}

/* ====== SUCCESS + RECEIPT ====== */
function showSuccessWithReceipt(title, amountNGN, extra){
  const now = new Date();
  const timeStr = now.toLocaleString();

  const html = `
    <div class="success-circle"><span>✓</span></div>
    <h3>Transaction Successful</h3>
    <p>${title}</p>
    <div class="receipt">
      <div class="receipt-row">
        <span>Amount</span>
        <span>${formatAmount(amountNGN < 0 ? -amountNGN : amountNGN)}</span>
      </div>
      <div class="receipt-row">
        <span>Date & Time</span>
        <span>${timeStr}</span>
      </div>
      ${extra || ""}
      <div class="receipt-row">
        <span>Status</span>
        <span class="green">Successful</span>
      </div>
    </div>
    <button class="confirm-btn" onclick="closeReceipt()">Done</button>
  `;
  showOverlay(html);
}

function closeReceipt(){
  hideOverlay();
  closePanel();
}

/* ====== PROCESS PENDING ACTION ====== */
function processPendingAction(){
  if(!pendingAction || !pendingPayload){
    hideOverlay();
    return;
  }

  const now = new Date();
  const timeStr = now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  const dayStr = "Today • " + timeStr;

  if(pendingAction === "transfer"){
    const {name, account, amountNGN} = pendingPayload;
    baseBalanceNGN -= amountNGN;
    transactions.push({
      title:`Transfer to ${name}`,
      time:dayStr,
      amountNGN:-amountNGN,
      status:"success"
    });
    saveState();
    updateBalanceDisplay();
    renderTransactions();

    const extra = `
      <div class="receipt-row">
        <span>Recipient</span>
        <span>${name}</span>
      </div>
      <div class="receipt-row">
        <span>Account</span>
        <span>${account}</span>
      </div>
    `;
    showSuccessWithReceipt(`You sent money to ${name}`, -amountNGN, extra);
  }

  if(pendingAction === "airtime"){
    const {phone, amountNGN} = pendingPayload;
    baseBalanceNGN -= amountNGN;
    transactions.push({
      title:`Airtime to ${phone}`,
      time:dayStr,
      amountNGN:-amountNGN,
      status:"success"
    });
    saveState();
    updateBalanceDisplay();
    renderTransactions();

    const extra = `
      <div class="receipt-row">
        <span>Phone</span>
        <span>${phone}</span>
      </div>
    `;
    showSuccessWithReceipt(`Airtime purchase for ${phone}`, -amountNGN, extra);
  }

  if(pendingAction === "bill"){
    const {type, amountNGN} = pendingPayload;
    baseBalanceNGN -= amountNGN;
    transactions.push({
      title:`Bill Payment - ${type}`,
      time:dayStr,
      amountNGN:-amountNGN,
      status:"success"
    });
    saveState();
    updateBalanceDisplay();
    renderTransactions();

    const extra = `
      <div class="receipt-row">
        <span>Bill Type</span>
        <span>${type}</span>
      </div>
    `;
    showSuccessWithReceipt(`Bill payment for ${type}`, -amountNGN, extra);
  }

  if(pendingAction === "data"){
    const {network, plan, amountNGN} = pendingPayload;
    baseBalanceNGN -= amountNGN;
    transactions.push({
      title:`Data - ${network} (${plan})`,
      time:dayStr,
      amountNGN:-amountNGN,
      status:"success"
    });
    saveState();
    updateBalanceDisplay();
    renderTransactions();

    const extra = `
      <div class="receipt-row">
        <span>Network</span>
        <span>${network}</span>
      </div>
      <div class="receipt-row">
        <span>Plan</span>
        <span>${plan}</span>
      </div>
    `;
    showSuccessWithReceipt(`Data purchase on ${network}`, -amountNGN, extra);
  }

  if(pendingAction === "receive"){
    const {sender, account, amountNGN, desc} = pendingPayload;
    baseBalanceNGN += amountNGN;
    const txnId = generateUUID();
    const refNo = generateUUID();

    transactions.push({
      title:`Received from ${sender}`,
      time:dayStr,
      amountNGN:amountNGN,
      status:"success"
    });
    saveState();
    updateBalanceDisplay();
    renderTransactions();

    const extra = `
      <div class="receipt-row">
        <span>Sender</span>
        <span>${sender}</span>
      </div>
      <div class="receipt-row">
        <span>Sender Account</span>
        <span>${account}</span>
      </div>
      ${desc ? `
      <div class="receipt-row">
        <span>Description</span>
        <span>${desc}</span>
      </div>` : ""}
      <div class="receipt-row">
        <span>Transaction ID</span>
        <span>${txnId}</span>
      </div>
      <div class="receipt-row">
        <span>Reference No</span>
        <span>${refNo}</span>
      </div>
    `;
    showSuccessWithReceipt(`Received from ${sender}`, amountNGN, extra);
  }

  pendingAction = null;
  pendingPayload = null;
}

  window.scrollTo({top:0, behavior:"smooth"});
}
